name: Test Email

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: '587'
      DRY_RUN: 'false'
      LOG_LEVEL: INFO
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Send test email
        run: |
          python -c "from app.notifier import send_email; import sys; sys.exit(0 if send_email('[upbit-alert] 파이프라인 테스트', '안녕하세요!\n\nupbit-news-alert 알림 파이프라인이 정상 작동합니다.\n\n- Gmail SMTP OK\n- GitHub Actions 러너에서 발송 가능\n- 본인 주소로 정상 수신\n\n실제 S/A급 호재 감지되면 동일 채널로 알림이 도착합니다.\n\n- upbit-news-alert via GitHub Actions') else 1)"
