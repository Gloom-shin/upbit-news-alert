name: Weekly Outcome Report

on:
  schedule:
    - cron: '52 13 * * SUN'   # UTC 13:52 SUN = KST 일요일 22:52 — 매시 0분 부하 회피
  workflow_dispatch:
    inputs:
      days_window:
        description: '집계 일수 (기본 7)'
        required: false
        default: '7'

permissions:
  contents: read

concurrency:
  group: outcome-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_MODEL: claude-haiku-4-5-20251001
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: '587'
      MIN_CONSECUTIVE_UP_DAYS: '2'
      MAX_CONSECUTIVE_UP_DAYS: '3'
      DRY_RUN: 'false'
      LOG_LEVEL: INFO
      TZ: Asia/Seoul
      DB_PATH: data/alerts.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Restore SQLite state
        uses: actions/cache/restore@v4
        with:
          path: data/alerts.db
          key: alerts-db-report-${{ github.run_id }}
          restore-keys: |
            alerts-db-

      - name: Ensure data dir
        run: mkdir -p data

      - name: Run outcome report
        env:
          DAYS_WINDOW: ${{ github.event.inputs.days_window || '7' }}
        run: python -m app.outcome_report
